name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-typecheck:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Login to CodeArtifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_CODEARTIFACT_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_CODEARTIFACT_SECRET_ACCESS_KEY }}
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain takaro --domain-owner 967985385710 \
            --region eu-west-3 --query authorizationToken --output text)
          REGISTRY=takaro-967985385710.d.codeartifact.eu-west-3.amazonaws.com
          npm config set //${REGISTRY}/npm/takaro-private/:_authToken=$TOKEN

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Login to CodeArtifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_CODEARTIFACT_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_CODEARTIFACT_SECRET_ACCESS_KEY }}
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain takaro --domain-owner 967985385710 \
            --region eu-west-3 --query authorizationToken --output text)
          REGISTRY=takaro-967985385710.d.codeartifact.eu-west-3.amazonaws.com
          npm config set //${REGISTRY}/npm/takaro-private/:_authToken=$TOKEN

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Login to ECR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ECR_CI_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ECR_CI_SECRET_ACCESS_KEY }}
        run: |
          aws ecr get-login-password --region eu-west-3 \
            | docker login --username AWS --password-stdin 967985385710.dkr.ecr.eu-west-3.amazonaws.com

      - name: Bootstrap Takaro stack
        env:
          AWS_ECR_REGISTRY: 967985385710.dkr.ecr.eu-west-3.amazonaws.com
        run: bash scripts/ci-bootstrap.sh

      - name: Run tests
        timeout-minutes: 30
        run: npm test

      - name: Capture docker compose logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs > docker-logs.txt 2>&1

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes --remove-orphans
