name: Publish Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-registry
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Login to CodeArtifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_CODEARTIFACT_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_CODEARTIFACT_SECRET_ACCESS_KEY }}
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain takaro --domain-owner 967985385710 \
            --region eu-west-3 --query authorizationToken --output text)
          REGISTRY=takaro-967985385710.d.codeartifact.eu-west-3.amazonaws.com
          npm config set //${REGISTRY}/npm/takaro-private/:_authToken=$TOKEN

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build TypeScript
        run: npm run build

      - name: Build registry
        run: npm run build:registry

      - name: Publish to registry branch
        # force_orphan: true — the registry branch carries no commit history.
        # Each push to main produces a clean snapshot of the current registry state.
        # We intentionally accept this loss of history pre-1.0.1: the registry branch
        # is purely a distribution artifact, not a source branch, so history adds no value.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/registry
          publish_branch: registry
          force_orphan: true
          keep_files: false
